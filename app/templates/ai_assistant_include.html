﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿<style>
    .ai-assistant-float {
        position: fixed;
        top: 0;
        right: 0;
        width: 400px;
        height: 100vh;
        background-color: white;
        border-radius: 0;
        box-shadow: -4px 0 20px rgba(0,0,0,0.15);
        z-index: 9999;
        display: none;
        flex-direction: column;
        overflow: hidden;
        animation: slideInRight 0.3s ease;
    }
    
    @keyframes slideInRight {
        from {
            transform: translateX(100%);
        }
        to {
            transform: translateX(0);
        }
    }
    
    .ai-assistant-float.active {
        display: flex;
    }
    
    .ai-assistant-header {
        background: linear-gradient(135deg, #6C5CE7 0%, #7C3AED 100%);
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 12px 12px 0 0;
    }
    
    .ai-assistant-header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
    }
    
    .ai-assistant-close {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        padding: 0;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: all 0.3s ease;
    }
    
    .ai-assistant-close:hover {
        background-color: rgba(255,255,255,0.2);
    }
    
    .ai-assistant-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    
    .ai-model-selector {
        padding: 10px 15px;
        border-bottom: 1px solid #E2E8F0;
    }
    
    .ai-model-selector select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #E2E8F0;
        border-radius: 6px;
        font-size: 14px;
        background-color: #F8FAFC;
        cursor: pointer;
    }
    
    .ai-model-selector select:focus {
        outline: none;
        border-color: #6C5CE7;
    }
    
    .ai-chat-history {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background-color: #F8FAFC;
    }
    
    .ai-message {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
    }
    
    .ai-message.user {
        align-items: flex-end;
    }
    
    .ai-message.ai {
        align-items: flex-start;
    }
    
    .ai-message-content {
        max-width: 85%;
        padding: 12px 15px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.5;
        word-wrap: break-word;
    }
    
    .ai-message.user .ai-message-content {
        background-color: #6C5CE7;
        color: white;
        border-radius: 12px 12px 0 12px;
    }
    
    .ai-message.ai .ai-message-content {
        background-color: white;
        color: #333;
        border: 1px solid #E2E8F0;
        border-radius: 12px 12px 12px 0;
    }
    
    .ai-message-time {
        font-size: 11px;
        color: #999;
        margin-top: 5px;
    }
    
    .ai-message.user .ai-message-time {
        text-align: right;
    }
    
    .ai-message.ai .ai-message-time {
        text-align: left;
    }
    
    .ai-input-area {
        padding: 15px;
        background-color: white;
        border-top: 1px solid #E2E8F0;
    }
    
    .ai-input-options {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }
    
    .ai-option-btn {
        padding: 6px 12px;
        border: 1px solid #E2E8F0;
        background-color: white;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .ai-option-btn:hover {
        background-color: #F8FAFC;
        border-color: #6C5CE7;
    }
    
    .ai-option-btn.active {
        background-color: #6C5CE7;
        color: white;
        border-color: #6C5CE7;
    }
    
    .ai-textarea {
        width: 100%;
        min-height: 80px;
        max-height: 200px;
        padding: 12px;
        border: 1px solid #E2E8F0;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        resize: vertical;
        transition: all 0.3s ease;
    }
    
    .ai-textarea:focus {
        outline: none;
        border-color: #6C5CE7;
        box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    
    .ai-textarea::placeholder {
        color: #999;
    }
    
    .ai-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
    }
    
    .ai-upload-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 8px 15px;
        background-color: #F8FAFC;
        border: 1px solid #E2E8F0;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .ai-upload-btn:hover {
        background-color: #e9ecef;
        border-color: #6C5CE7;
    }
    
    .ai-upload-btn input {
        display: none;
    }
    
    .ai-send-btn {
        padding: 8px 25px;
        background: linear-gradient(135deg, #6C5CE7 0%, #7C3AED 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .ai-send-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102,126,234,0.3);
    }
    
    .ai-send-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }
    
    .ai-trigger-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6C5CE7 0%, #7C3AED 100%);
        color: white;
        border: none;
        box-shadow: 0 4px 20px rgba(102,126,234,0.4);
        cursor: pointer;
        z-index: 9998;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
    }
    
    .ai-trigger-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 25px rgba(102,126,234,0.5);
    }
    
    .ai-trigger-btn::before {
        content: '?';
        position: absolute;
        top: -10px;
        right: -10px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background-color: #ff6b6b;
        color: white;
        font-size: 16px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(255,107,107,0.5);
    }
    
    .ai-trigger-btn svg {
        width: 30px;
        height: 30px;
    }
    
    .ai-image-preview {
        position: relative;
        display: inline-block;
        margin-top: 10px;
    }
    
    .ai-image-preview img {
        max-width: 100px;
        max-height: 100px;
        border-radius: 8px;
        border: 1px solid #E2E8F0;
    }
    
    .ai-image-preview .ai-remove-image {
        position: absolute;
        top: -8px;
        right: -8px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background-color: #dc3545;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .ai-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    
    .ai-loading-spinner {
        width: 30px;
        height: 30px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #6C5CE7;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    .ai-code-block {
        background-color: #f4f4f4;
        border-radius: 6px;
        padding: 12px;
        margin: 10px 0;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        overflow-x: auto;
    }
    
    .ai-code-block pre {
        margin: 0;
        white-space: pre-wrap;
        word-wrap: break-word;
    }

    .ai-message-content h1,
    .ai-message-content h2,
    .ai-message-content h3,
    .ai-message-content h4 {
        margin-top: 12px;
        margin-bottom: 8px;
        font-weight: 600;
    }

    .ai-message-content h1 { font-size: 18px; }
    .ai-message-content h2 { font-size: 16px; }
    .ai-message-content h3 { font-size: 15px; }
    .ai-message-content h4 { font-size: 14px; }

    .ai-message-content ul,
    .ai-message-content ol {
        padding-left: 24px;
        margin: 8px 0;
    }

    .ai-message-content li {
        margin: 4px 0;
        line-height: 1.6;
    }

    .ai-message-content p {
        margin: 8px 0;
        line-height: 1.6;
    }

    .ai-message-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 10px 0;
        font-size: 13px;
    }

    .ai-message-content th,
    .ai-message-content td {
        border: 1px solid #E2E8F0;
        padding: 8px 12px;
        text-align: left;
    }

    .ai-message-content th {
        background-color: #f5f5f5;
        font-weight: 600;
    }

    .ai-message-content blockquote {
        border-left: 4px solid #6C5CE7;
        padding: 8px 16px;
        margin: 10px 0;
        background-color: #f9f9f9;
        color: #555;
    }

    .ai-message-content strong {
        font-weight: 600;
        color: #1E293B;
    }

    .ai-message-content a {
        color: #6C5CE7;
        text-decoration: none;
    }

    .ai-message-content a:hover {
        text-decoration: underline;
    }

    .ai-message-content hr {
        border: none;
        border-top: 1px solid #E2E8F0;
        margin: 15px 0;
    }

    /* ===== 移动端适配样式 ===== */
    @media (max-width: 768px) {
        .ai-assistant-float {
            width: 100vw;
            max-width: 100vw;
            height: 100vh;
            border-radius: 0;
        }

        .ai-sidebar {
            position: absolute;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            z-index: 10;
            transition: left 0.3s ease;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .ai-sidebar.mobile-open {
            left: 0;
        }

        .ai-sidebar-toggle {
            display: flex !important;
        }

        .ai-main-content {
            width: 100%;
        }

        .ai-assistant-header h3 {
            font-size: 14px;
        }

        .ai-model-selector select {
            font-size: 13px;
            padding: 6px 8px;
        }

        .ai-textarea {
            min-height: 60px;
            font-size: 15px;
        }

        .ai-send-btn {
            padding: 10px 20px;
            font-size: 13px;
        }

        .ai-upload-btn {
            padding: 8px 12px;
            font-size: 12px;
        }

        .ai-message-content {
            font-size: 13px;
            padding: 12px;
        }

        .ai-code-block {
            font-size: 11px;
            padding: 8px;
            overflow-x: auto;
        }

        .ai-input-options {
            flex-wrap: wrap;
            gap: 6px;
        }

        .ai-option-btn {
            padding: 6px 12px;
            font-size: 12px;
        }

        .ai-trigger-btn {
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
        }
    }

    @media (max-width: 480px) {
        .ai-assistant-header {
            padding: 12px 15px;
        }

        .ai-chat-history {
            padding: 12px;
        }

        .ai-textarea {
            min-height: 50px;
        }

        .ai-send-btn {
            width: 100%;
            margin-top: 8px;
        }

        .ai-actions {
            flex-direction: column;
            gap: 8px;
        }

        .ai-upload-btn {
            justify-content: center;
        }

        .ai-new-chat-btn {
            padding: 8px;
            font-size: 13px;
        }

        .ai-session-item {
            padding: 10px;
        }

        .ai-session-title {
            font-size: 13px;
        }

        .ai-session-meta {
            font-size: 10px;
        }
    }

    /* ===== 标签样式 ===== */
    .ai-tags-container {
        padding: 10px;
        border-bottom: 1px solid #E2E8F0;
        background: #fafafa;
    }

    .ai-tag {
        display: inline-block;
        padding: 4px 12px;
        margin: 4px;
        font-size: 11px;
        color: #6C5CE7;
        background: #f0f0ff;
        border: 1px solid #d0d0ff;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .ai-tag:hover {
        background: #6C5CE7;
        color: white;
        transform: scale(1.05);
    }

    .ai-tag.active {
        background: #6C5CE7;
        color: white;
    }

    .ai-session-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-top: 6px;
    }

    .ai-session-tag {
        display: inline-block;
        padding: 2px 8px;
        font-size: 10px;
        color: #7C3AED;
        background: #f5f0ff;
        border-radius: 10px;
    }

    /* ===== 收藏按钮样式 ===== */
    .ai-favorite-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        padding: 4px 8px;
        border-radius: 4px;
        transition: all 0.2s ease;
        opacity: 0.6;
    }

    .ai-favorite-btn:hover {
        opacity: 1;
        transform: scale(1.2);
    }

    .ai-favorite-btn.active {
        color: #f39c12;
        opacity: 1;
    }

    .ai-favorites-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 500px;
        max-width: 90vw;
        max-height: 70vh;
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.25);
        z-index: 10000;
        display: none;
        overflow: hidden;
    }

    .ai-favorites-panel.show {
        display: block;
    }

    .ai-favorites-header {
        padding: 15px 20px;
        background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .ai-favorites-list {
        overflow-y: auto;
        max-height: calc(70vh - 60px);
        padding: 10px;
    }

    .ai-favorite-item {
        padding: 12px;
        border-bottom: 1px solid #F1F5F9;
        cursor: pointer;
        transition: background 0.2s;
    }

    .ai-favorite-item:hover {
        background: #fff9e6;
    }

    .ai-favorite-content {
        font-size: 13px;
        color: #333;
        line-height: 1.5;
        margin-bottom: 6px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .ai-favorite-meta {
        font-size: 11px;
        color: #999;
        display: flex;
        justify-content: space-between;
    }

    /* 触摸设备优化 */
    @media (hover: none) and (pointer: coarse) {
        .ai-option-btn,
        .ai-send-btn,
        .ai-upload-btn,
        .ai-new-chat-btn,
        .ai-session-item,
        .ai-session-delete {
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    }

    /* 暗黑模式支持 */
    @media (prefers-color-scheme: dark) {
        .ai-assistant-float {
            background-color: #1a1a2e;
            color: #E2E8F0;
        }

        .ai-sidebar {
            background-color: #16213e;
            border-right-color: #0f3460;
        }

        .ai-session-item {
            background-color: #1a1a2e;
            color: #E2E8F0;
        }

        .ai-session-item:hover,
        .ai-session-item.active {
            background-color: #0f3460;
            border-color: #6C5CE7;
        }

        .ai-main-content {
            background-color: #1a1a2e;
        }

        .ai-chat-history {
            background-color: #16213e;
        }

        .ai-message.user .ai-message-content {
            background: linear-gradient(135deg, #6C5CE7 0%, #7C3AED 100%);
        }

        .ai-message.ai .ai-message-content {
            background-color: #0f3460;
            color: #E2E8F0;
            border-color: #1a1a2e;
        }

        .ai-input-area {
            background-color: #16213e;
            border-top-color: #0f3460;
        }

        .ai-textarea {
            background-color: #0f3460;
            color: #E2E8F0;
            border-color: #1a1a2e;
        }

        .ai-textarea:focus {
            border-color: #6C5CE7;
        }

        .ai-option-btn {
            background-color: #0f3460;
            color: #E2E8F0;
            border-color: #1a1a2e;
        }

        .ai-option-btn.active {
            background-color: #6C5CE7;
        }

        .ai-code-block {
            background-color: #0f3460;
        }

        blockquote {
            background-color: #0f3460;
            border-left-color: #6C5CE7;
            color: #b0b0b0;
        }

        table th {
            background-color: #0f3460;
        }

        table td, table th {
            border-color: #1a1a2e;
        }
    }

    /* ===== 会话侧边栏样式 ===== */
    .ai-assistant-float {
        position: fixed;
        top: 0;
        right: 0;
        width: 900px;
        max-width: calc(100vw - 20px);
        height: 100vh;
        background-color: white;
        border-radius: 12px;
        box-shadow: -4px 0 30px rgba(0,0,0,0.2);
        z-index: 9999;
        display: none;
        flex-direction: row;
        overflow: hidden;
        animation: slideInRight 0.3s ease;
    }

    @keyframes slideInRight {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    .ai-assistant-float.active {
        display: flex;
    }

    .ai-sidebar {
        width: 280px;
        min-width: 280px;
        background-color: #F8FAFC;
        border-right: 1px solid #E2E8F0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .ai-sidebar-header {
        padding: 16px;
        background: linear-gradient(135deg, #6C5CE7 0%, #7C3AED 100%);
        color: white;
    }

    .ai-sidebar-header h3 {
        margin: 0 0 12px 0;
        font-size: 16px;
        font-weight: 600;
    }

    .ai-new-chat-btn {
        width: 100%;
        padding: 10px;
        background: rgba(255,255,255,0.2);
        color: white;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }

    .ai-new-chat-btn:hover {
        background: rgba(255,255,255,0.3);
        transform: translateY(-1px);
    }

    .ai-sessions-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
    }

    .ai-session-item {
        padding: 12px;
        margin-bottom: 6px;
        background: white;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        border: 2px solid transparent;
        position: relative;
    }

    .ai-session-item:hover {
        background: #f0f0ff;
        border-color: #6C5CE7;
    }

    .ai-session-item.active {
        background: #e8ebff;
        border-color: #6C5CE7;
        box-shadow: 0 2px 8px rgba(102,126,234,0.15);
    }

    .ai-session-title {
        font-size: 14px;
        font-weight: 500;
        color: #1E293B;
        margin-bottom: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .ai-session-meta {
        font-size: 11px;
        color: #999;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .ai-session-delete {
        background: none;
        border: none;
        color: #999;
        cursor: pointer;
        font-size: 16px;
        padding: 0 4px;
        border-radius: 4px;
        opacity: 0;
        transition: all 0.2s ease;
    }

    .ai-session-item:hover .ai-session-delete {
        opacity: 1;
    }

    .ai-session-delete:hover {
        color: #dc3545;
        background: #ffe5e5;
    }

    .ai-main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .ai-assistant-header {
        background: linear-gradient(135deg, #6C5CE7 0%, #7C3AED 100%);
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 0;
    }

    .ai-assistant-header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
    }

    .ai-assistant-close {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        padding: 0;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: all 0.3s ease;
    }

    .ai-assistant-close:hover {
        background-color: rgba(255,255,255,0.2);
    }

    .ai-assistant-body {
        flex: 1;

<script>
document.addEventListener('DOMContentLoaded', function() {
    const aiAssistantFloat = document.getElementById('aiAssistantFloat');
    const aiTriggerBtn = document.getElementById('aiTriggerBtn');
    const aiCloseBtn = document.getElementById('aiCloseBtn');
    const aiSendBtn = document.getElementById('aiSendBtn');
    const aiInput = document.getElementById('aiInput');
    const aiChatHistory = document.getElementById('aiChatHistory');
    const aiModelSelect = document.getElementById('aiModelSelect');
    const aiTextBtn = document.getElementById('aiTextBtn');
    const aiCodeBtn = document.getElementById('aiCodeBtn');
    const aiImageBtn = document.getElementById('aiImageBtn');
    const aiImageInput = document.getElementById('aiImageInput');
    const aiImagePreview = document.getElementById('aiImagePreview');
    const aiPreviewImg = document.getElementById('aiPreviewImg');
    const aiRemoveImage = document.getElementById('aiRemoveImage');
    const aiSessionsList = document.getElementById('aiSessionsList');

    let currentProblemId = null;
    let currentInputType = 'text';
    let uploadedImageData = null;
    let currentSessionId = null;
    let sessions = [];

    function loadModels() {
        fetch('/ai/models')
            .then(r => r.json())
            .then(data => {
                const select = aiModelSelect;
                select.innerHTML = '';
                (data.models || []).forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.key;
                    opt.textContent = m.name + (m.is_active ? ' ✓' : '') + (m.is_healthy ? '' : ' (离线)');
                    opt.disabled = !m.available;
                    if (m.is_active) opt.selected = true;
                    select.appendChild(opt);
                });
                if (select.options.length === 0) {
                    const opt = document.createElement('option');
                    opt.value = 'caigpt';
                    opt.textContent = 'CAIgpt';
                    select.appendChild(opt);
                }
            })
            .catch(() => {});
    }
    loadModels();

    aiModelSelect.addEventListener('change', function() {
        const provider = this.value;
        fetch('/ai/models/switch', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({provider: provider})
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                loadModels();
            }
        })
        .catch(() => {});
    });

    const aiMemoryBtn = document.getElementById('aiMemoryBtn');
    if (aiMemoryBtn) {
        aiMemoryBtn.addEventListener('click', function() {
            toggleMemoryPanel();
        });
    }

    function toggleMemoryPanel() {
        let panel = document.getElementById('aiMemoryPanel');
        if (panel) {
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            if (panel.style.display === 'block') loadMemoryPanel();
            return;
        }
        panel = document.createElement('div');
        panel.id = 'aiMemoryPanel';
        panel.style.cssText = 'position:absolute;top:40px;left:0;right:0;bottom:0;background:#fff;z-index:100;overflow-y:auto;padding:12px;font-size:13px;';
        panel.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">加载中...</div>';
        const chatHistory = document.getElementById('aiChatHistory');
        if (chatHistory) {
            chatHistory.style.position = 'relative';
            chatHistory.appendChild(panel);
        }
        loadMemoryPanel();
    }

    function loadMemoryPanel() {
        const panel = document.getElementById('aiMemoryPanel');
        if (!panel) return;
        Promise.all([
            fetch('/ai/memories?limit=50').then(r => r.json()),
            fetch('/ai/memories/stats').then(r => r.json())
        ]).then(([memData, statsData]) => {
            const memories = memData.memories || [];
            const stats = statsData.stats || {};
            let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
            html += '<h4 style="margin:0;">🧠 我的知识网络</h4>';
            html += '<button onclick="document.getElementById(\'aiMemoryPanel\').style.display=\'none\'" style="border:none;background:none;font-size:18px;cursor:pointer;">✕</button>';
            html += '</div>';
            html += '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">';
            const typeLabels = {knowledge:'知识点',weakness:'薄弱环节',preference:'学习偏好',mistake:'常见错误',progress:'学习进度',note:'个人笔记'};
            if (stats.by_type) {
                for (const [type, info] of Object.entries(stats.by_type)) {
                    html += `<span style="background:#f0f0f0;padding:2px 8px;border-radius:10px;font-size:11px;">${typeLabels[type]||type}: ${info.count}</span>`;
                }
            }
            html += `<span style="background:#e8f5e9;padding:2px 8px;border-radius:10px;font-size:11px;">总计: ${stats.total||0}</span>`;
            html += '</div>';
            html += '<div style="margin-bottom:12px;"><input id="memorySearchInput" type="text" placeholder="搜索记忆..." style="width:100%;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;" onkeydown="if(event.key===\'Enter\')searchMemories()"></div>';
            if (memories.length === 0) {
                html += '<p style="color:#999;text-align:center;">还没有记忆，开始与AI对话吧！</p>';
            } else {
                const groups = {};
                memories.forEach(m => {
                    if (!groups[m.memory_type]) groups[m.memory_type] = [];
                    groups[m.memory_type].push(m);
                });
                for (const [type, items] of Object.entries(groups)) {
                    html += `<div style="margin-bottom:10px;"><div style="font-weight:bold;color:#333;margin-bottom:4px;">${typeLabels[type]||type}</div>`;
                    items.forEach(m => {
                        html += `<div style="background:#f9f9f9;padding:6px 8px;margin:3px 0;border-radius:4px;display:flex;justify-content:space-between;align-items:center;">`;
                        html += `<span style="flex:1;">${m.content}</span>`;
                        html += `<button onclick="deleteMemory(${m.id})" style="border:none;background:none;color:#e53935;cursor:pointer;font-size:14px;margin-left:6px;" title="删除">✕</button>`;
                        html += `</div>`;
                    });
                    html += '</div>';
                }
            }
            html += '<div style="margin-top:12px;text-align:center;"><button onclick="evolveMemories()" style="padding:6px 16px;border:1px solid #4CAF50;background:#e8f5e9;color:#2e7d32;border-radius:6px;cursor:pointer;font-size:12px;">🔄 记忆进化</button></div>';
            panel.innerHTML = html;
        }).catch(err => {
            panel.innerHTML = '<p style="color:red;text-align:center;">加载失败</p>';
        });
    }

    window.searchMemories = function() {
        const keyword = document.getElementById('memorySearchInput').value;
        if (!keyword || keyword.length < 2) return;
        fetch(`/ai/memories/search?keyword=${encodeURIComponent(keyword)}`)
            .then(r => r.json())
            .then(data => {
                const panel = document.getElementById('aiMemoryPanel');
                if (!panel) return;
                const memories = data.memories || [];
                const typeLabels = {knowledge:'知识点',weakness:'薄弱环节',preference:'学习偏好',mistake:'常见错误',progress:'学习进度',note:'个人笔记'};
                let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
                html += '<h4 style="margin:0;">🔍 搜索结果: "' + keyword + '"</h4>';
                html += '<button onclick="loadMemoryPanel()" style="border:none;background:#f0f0f0;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;">返回</button>';
                html += '</div>';
                if (memories.length === 0) {
                    html += '<p style="color:#999;text-align:center;">未找到相关记忆</p>';
                } else {
                    memories.forEach(m => {
                        html += `<div style="background:#f9f9f9;padding:6px 8px;margin:3px 0;border-radius:4px;">`;
                        html += `<span style="color:#888;font-size:11px;">[${typeLabels[m.memory_type]||m.memory_type}]</span> ${m.content}`;
                        html += `</div>`;
                    });
                }
                panel.innerHTML = html;
            });
    };

    window.deleteMemory = function(id) {
        if (!confirm('确定删除这条记忆？')) return;
        fetch(`/ai/memories/${id}`, {method: 'DELETE'})
            .then(r => r.json())
            .then(() => loadMemoryPanel());
    };

    window.evolveMemories = function() {
        fetch('/ai/memories/evolve', {method: 'POST'})
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('记忆进化完成！');
                    loadMemoryPanel();
                }
            });
    };

    window.loadMemoryPanel = loadMemoryPanel;

    aiTriggerBtn.addEventListener('click', function() {
        aiAssistantFloat.classList.toggle('active');
        if (aiAssistantFloat.classList.contains('active')) {
            loadSessions();
        }
    });

    aiCloseBtn.addEventListener('click', function() {
        aiAssistantFloat.classList.remove('active');
    });
    
    aiTextBtn.addEventListener('click', function() {
        setInputType('text');
    });
    
    aiCodeBtn.addEventListener('click', function() {
        setInputType('code');
    });
    
    aiImageBtn.addEventListener('click', function() {
        setInputType('image');
    });
    
    function setInputType(type) {
        currentInputType = type;
        aiTextBtn.classList.remove('active');
        aiCodeBtn.classList.remove('active');
        aiImageBtn.classList.remove('active');
        
        if (type === 'text') {
            aiTextBtn.classList.add('active');
            aiInput.placeholder = '输入你的问题...';
        } else if (type === 'code') {
            aiCodeBtn.classList.add('active');
            aiInput.placeholder = '粘贴你的代码...';
        } else if (type === 'image') {
            aiImageBtn.classList.add('active');
            aiInput.placeholder = '描述图片中的问题...';
        }
    }
    
    aiImageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedImageData = event.target.result.split(',')[1];
                aiPreviewImg.src = event.target.result;
                aiImagePreview.style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        }
    });
    
    aiRemoveImage.addEventListener('click', function() {
        uploadedImageData = null;
        aiImagePreview.style.display = 'none';
        aiImageInput.value = '';
    });
    
    aiSendBtn.addEventListener('click', sendMessage);
    
    aiInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    async function sendMessage() {
        const question = aiInput.value.trim();
        if (!question && !uploadedImageData) {
            alert('请输入问题或上传图片');
            return;
        }

        const model = aiModelSelect.value;
        const hasCode = currentInputType === 'code';
        const hasImage = uploadedImageData !== null;

        addUserMessage(question);

        aiInput.value = '';
        aiSendBtn.disabled = true;

        try {
            await sendNormalMessage(question, model, hasCode, hasImage);
        } catch (error) {
            removeLoading();
            removeStreamingMessage();
            addAIMessage('抱歉，网络连接失败，请稍后重试');
        }

        aiSendBtn.disabled = false;
    }

    async function sendStreamMessage(question, model, hasCode, hasImage) {
        showStreamingMessage();

        try {
            const response = await fetch('/ai/chat/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    question: question,
                    model: model,
                    problem_id: currentProblemId,
                    session_id: currentSessionId,
                    type: currentInputType,
                    has_code: hasCode,
                    has_image: hasImage,
                    image: uploadedImageData
                })
            });

            if (!response.ok) {
                const error = await response.json();
                removeStreamingMessage();
                addAIMessage('抱歉，AI服务暂时不可用：' + (error.error || '未知错误'));
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();

                if (done) {
                    break;
                }

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));

                            if (data.error) {
                                removeStreamingMessage();
                                addAIMessage('错误：' + data.error);
                                return;
                            }

                            if (data.content !== undefined) {
                                updateStreamingMessage(data.content);
                            }

                            if (data.done) {
                                finalizeStreamingMessage();
                                return;
                            }
                        } catch (e) {
                            console.error('Failed to parse SSE data:', e);
                        }
                    }
                }
            }
        } catch (error) {
            removeStreamingMessage();
            addAIMessage('流式响应出错：' + error.message);
        }
    }

    async function sendNormalMessage(question, model, hasCode, hasImage) {
        showLoading();

        try {
            const response = await fetch('/ai/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    question: question,
                    model: model,
                    problem_id: currentProblemId,
                    session_id: currentSessionId,
                    type: currentInputType,
                    has_code: hasCode,
                    has_image: hasImage,
                    image: uploadedImageData
                })
            });

            removeLoading();

            if (response.ok) {
                const data = await response.json();
                addAIMessage(data.answer);
            } else {
                const error = await response.json();
                addAIMessage('抱歉，AI服务暂时不可用：' + (error.error || '未知错误'));
            }
        } catch (error) {
            removeLoading();
            throw error;
        }
    }
    
    function addUserMessage(content) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'ai-message user';
        
        let messageContent = content;
        if (currentInputType === 'code') {
            messageContent = '<div class="ai-code-block"><pre>' + escapeHtml(content) + '</pre></div>';
        }
        
        messageDiv.innerHTML = `
            <div class="ai-message-content">${messageContent}</div>
            <div class="ai-message-time">刚刚</div>
        `;
        
        aiChatHistory.appendChild(messageDiv);
        aiChatHistory.scrollTop = aiChatHistory.scrollHeight;
    }
    
    function addAIMessage(content) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'ai-message ai';
        
        const formattedContent = formatMessage(content);
        
        messageDiv.innerHTML = `
            <div class="ai-message-content">${formattedContent}</div>
            <div class="ai-message-time">刚刚</div>
        `;
        
        aiChatHistory.appendChild(messageDiv);
        aiChatHistory.scrollTop = aiChatHistory.scrollHeight;
    }
    
    function showLoading() {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'ai-message ai';
        loadingDiv.id = 'aiLoadingMessage';
        loadingDiv.innerHTML = `
            <div class="ai-message-content">
                <div class="ai-loading">
                    <div class="ai-loading-spinner"></div>
                </div>
            </div>
        `;
        aiChatHistory.appendChild(loadingDiv);
        aiChatHistory.scrollTop = aiChatHistory.scrollHeight;
    }
    
    function removeLoading() {
        const loadingMessage = document.getElementById('aiLoadingMessage');
        if (loadingMessage) {
            loadingMessage.remove();
        }
    }

    let streamingContent = '';
    let streamingMessageElement = null;

    function showStreamingMessage() {
        streamingContent = '';

        const messageDiv = document.createElement('div');
        messageDiv.className = 'ai-message ai';
        messageDiv.id = 'aiStreamingMessage';

        messageDiv.innerHTML = `
            <div class="ai-message-content" id="streamingContent">
                <div class="ai-loading">
                    <div class="ai-loading-spinner"></div>
                </div>
            </div>
            <div class="ai-message-time">刚刚</div>
        `;

        aiChatHistory.appendChild(messageDiv);
        streamingMessageElement = messageDiv;
        aiChatHistory.scrollTop = aiChatHistory.scrollHeight;
    }

    function updateStreamingMessage(content) {
        streamingContent += content;

        const contentElement = document.getElementById('streamingContent');
        if (contentElement) {
            contentElement.innerHTML = formatMessage(streamingContent);
            aiChatHistory.scrollTop = aiChatHistory.scrollHeight;
        }
    }

    function removeStreamingMessage() {
        const streamingMessage = document.getElementById('aiStreamingMessage');
        if (streamingMessage) {
            streamingMessage.remove();
        }
        streamingMessageElement = null;
        streamingContent = '';
    }

    function finalizeStreamingMessage() {
        if (streamingMessageElement) {
            const contentElement = document.getElementById('streamingContent');
            if (contentElement) {
                contentElement.innerHTML = formatMessage(streamingContent);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'ai-message-actions';
                actionsDiv.style.cssText = 'margin-top: 8px; display: flex; gap: 10px;';
                actionsDiv.innerHTML = `
                    <button onclick="copyMessage(this)" style="padding: 4px 12px; font-size: 12px; background: #F1F5F9; border: none; border-radius: 4px; cursor: pointer;">📋 复制</button>
                    <button onclick="regenerateMessage()" style="padding: 4px 12px; font-size: 12px; background: #F1F5F9; border: none; border-radius: 4px; cursor: pointer;">🔄 重新生成</button>
                    <button onclick="toggleFavoriteMessage(streamingContent)" class="ai-favorite-btn" title="收藏此回答" style="padding: 4px 12px; font-size: 12px; background: #F1F5F9; border: none; border-radius: 4px; cursor: pointer;">⭐ 收藏</button>
                `;
                contentElement.appendChild(actionsDiv);
            }

            streamingMessageElement.querySelector('.ai-message-content').dataset.fullContent = streamingContent;
        }

        streamingMessageElement = null;
        streamingContent = '';
    }

    window.copyMessage = function(btn) {
        const messageContent = btn.closest('.ai-message-content');
        const text = messageContent.dataset.fullContent || messageContent.textContent;

        navigator.clipboard.writeText(text).then(() => {
            btn.textContent = '✅ 已复制';
            setTimeout(() => {
                btn.textContent = '📋 复制';
            }, 2000);
        });
    };

    window.regenerateMessage = function() {
        alert('重新生成功能开发中...');
    };
    
    function formatMessage(content) {
        if (typeof marked !== 'undefined' && typeof hljs !== 'undefined') {
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(code, { language: lang }).value;
                        } catch (e) {
                            console.error('Highlight error:', e);
                        }
                    }
                    if (code.trim()) {
                        try {
                            return hljs.highlightAuto(code).value;
                        } catch (e) {
                            console.error('Auto highlight error:', e);
                        }
                    }
                    return code;
                },
                breaks: true,
                gfm: true
            });

            try {
                let html = marked.parse(content);

                html = html.replace(/<pre><code class="language-(\w+)">/g, '<div class="ai-code-block"><pre><code class="language-$1">');
                html = html.replace(/<\/code><\/pre>/g, '</code></pre></div>');
                html = html.replace(/<pre><code>/g, '<div class="ai-code-block"><pre><code>');
                html = html.replace(/<\/code><\/pre>(?!<\/div>)/g, '</code></pre></div>');

                return html;
            } catch (e) {
                console.error('Markdown parse error:', e);
                return escapeHtml(content);
            }
        } else {
            let formatted = escapeHtml(content);
            formatted = formatted.replace(/```cpp\n([\s\S]*?)```/g, '<div class="ai-code-block"><pre>$1</pre></div>');
            formatted = formatted.replace(/```([\s\S]*?)```/g, '<div class="ai-code-block"><pre>$1</pre></div>');
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function setProblemId(problemId) {
        currentProblemId = problemId;
    }

    // ===== 会话管理功能 =====

    // ===== 搜索功能 =====
    let searchTimeout = null;

    window.handleSearchInput = function(value) {
        const clearBtn = document.getElementById('aiClearSearchBtn');

        if (value.length >= 2) {
            clearBtn.style.display = 'block';

            if (searchTimeout) {
                clearTimeout(searchTimeout);
            }

            searchTimeout = setTimeout(() => {
                searchSessions();
            }, 300);
        } else if (value.length === 0) {
            clearBtn.style.display = 'none';
            document.getElementById('aiSearchResults').style.display = 'none';
        }
    };

    window.searchSessions = async function() {
        const query = document.getElementById('aiSearchInput').value.trim();
        const resultsDiv = document.getElementById('aiSearchResults');

        if (!query || query.length < 2) {
            resultsDiv.style.display = 'none';
            return;
        }

        try {
            resultsDiv.innerHTML = '<div style="padding: 10px; text-align: center; color: #999; font-size: 12px;">搜索中...</div>';
            resultsDiv.style.display = 'block';

            const response = await fetch(`/ai/sessions/search?q=${encodeURIComponent(query)}`);

            if (response.ok) {
                const data = await response.json();

                if (data.sessions && data.sessions.length > 0) {
                    resultsDiv.innerHTML = `
                        <div style="font-size: 11px; color: #666; margin-bottom: 8px;">
                            找到 ${data.total} 个相关对话
                        </div>
                    ` + data.sessions.map(session => `
                        <div class="ai-session-item"
                             style="margin-bottom: 4px; cursor: pointer;"
                             onclick="switchSession(${session.id}); clearSearch();">
                            <div class="ai-session-title">${escapeHtml(session.title)}</div>
                            <div class="ai-session-meta">
                                <span>${session.message_count || 0} 条消息</span>
                                <span>${new Date(session.updated_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    resultsDiv.innerHTML = `
                        <div style="padding: 15px; text-align: center; color: #999; font-size: 12px;">
                            未找到 "${escapeHtml(query)}" 相关对话
                        </div>
                    `;
                }
            }
        } catch (error) {
            console.error('Search failed:', error);
            resultsDiv.innerHTML = '<div style="padding: 10px; text-align: center; color: #dc3545; font-size: 12px;">搜索失败</div>';
        }
    };

    window.clearSearch = function() {
        const searchInput = document.getElementById('aiSearchInput');
        const clearBtn = document.getElementById('aiClearSearchBtn');
        const resultsDiv = document.getElementById('aiSearchResults');

        searchInput.value = '';
        clearBtn.style.display = 'none';
        resultsDiv.style.display = 'none';

        if (searchTimeout) {
            clearTimeout(searchTimeout);
        }
    };

    // 移动端检测和适配
    function checkMobile() {
        const isMobile = window.innerWidth <= 768;
        const sidebarToggle = document.getElementById('aiSidebarToggle');
        const sidebar = document.querySelector('.ai-sidebar');

        if (sidebarToggle && sidebar) {
            if (isMobile) {
                sidebarToggle.style.display = 'flex';
                sidebar.classList.remove('mobile-open');
            } else {
                sidebarToggle.style.display = 'none';
                sidebar.classList.remove('mobile-open');
            }
        }
    }

    window.toggleMobileSidebar = function() {
        const sidebar = document.querySelector('.ai-sidebar');
        if (sidebar) {
            sidebar.classList.toggle('mobile-open');
        }
    };

    // 监听窗口大小变化
    window.addEventListener('resize', checkMobile);
    
    // 初始化时检查
    setTimeout(checkMobile, 100);

    async function loadSessions() {
        try {
            const response = await fetch('/ai/sessions');
            if (response.ok) {
                const data = await response.json();
                sessions = data.sessions || [];
                renderSessionsList();
                loadTags();
            }
        } catch (error) {
            console.error('Failed to load sessions:', error);
            aiSessionsList.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">加载失败</div>';
        }
    }

    // ===== 标签功能 =====
    let allTags = [];
    let activeTag = null;

    async function loadTags() {
        try {
            const response = await fetch('/ai/tags');
            if (response.ok) {
                const data = await response.json();
                allTags = data.tags || [];
                renderTags();
            }
        } catch (error) {
            console.error('Failed to load tags:', error);
        }
    }

    function renderTags() {
        const tagsContainer = document.getElementById('aiTagsList');

        if (allTags.length === 0) {
            tagsContainer.innerHTML = `
                <span style="color: #999; font-size: 11px;">暂无标签</span>
            `;
            return;
        }

        tagsContainer.innerHTML = allTags.map(tag => `
            <span class="ai-tag ${activeTag === tag ? 'active' : ''}"
                  onclick="filterByTag('${escapeHtml(tag)}')">
                ${escapeHtml(tag)}
            </span>
        `).join('');
    }

    window.filterByTag = async function(tagName) {
        activeTag = tagName;

        renderTags();

        try {
            const response = await fetch(`/ai/sessions/tag/${encodeURIComponent(tagName)}`);
            if (response.ok) {
                const data = await response.json();
                sessions = data.sessions || [];
                renderSessionsList();
            }
        } catch (error) {
            console.error('Failed to filter by tag:', error);
        }
    };

    window.showAllSessions = async function() {
        activeTag = null;
        renderTags();
        await loadSessions();
    };

    function renderSessionsList() {
        if (sessions.length === 0) {
            aiSessionsList.innerHTML = `
                <div style="padding: 20px; text-align: center; color: #999;">
                    暂无对话记录
                </div>
            `;
            return;
        }

        aiSessionsList.innerHTML = sessions.map(session => {
            const tags = session.tags || [];
            const tagsHtml = tags.length > 0
                ? `<div class="ai-session-tags">${tags.map(tag => `<span class="ai-session-tag">${escapeHtml(tag)}</span>`).join('')}</div>`
                : '';

            return `
            <div class="ai-session-item ${session.id === currentSessionId ? 'active' : ''}"
                 data-session-id="${session.id}"
                 onclick="switchSession(${session.id})">
                <div class="ai-session-title">${escapeHtml(session.title)}</div>
                ${tagsHtml}
                <div class="ai-session-meta">
                    <span>${session.message_count || 0} 条消息</span>
                    <button class="ai-session-delete"
                            onclick="event.stopPropagation(); deleteSession(${session.id})"
                            title="删除会话">×</button>
                </div>
            </div>
            `;
        }).join('');
    }

    window.createNewSession = async function() {
        try {
            const response = await fetch('/ai/sessions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: '新对话',
                    model: aiModelSelect.value
                })
            });

            if (response.ok) {
                const data = await response.json();
                currentSessionId = data.session.id;

                aiChatHistory.innerHTML = `
                    <div class="ai-message ai">
                        <div class="ai-message-content">
                            你好！我是你的C++编程助手。我可以帮你：
                            <br><br>
                            • 分析代码中的问题<br>
                            • 提供解题思路和方法<br>
                            • 解释C++知识点<br>
                            • 指导你完成编程练习
                            <br><br>
                            请告诉我你需要什么帮助！
                        </div>
                        <div class="ai-message-time">现在</div>
                    </div>
                `;

                await loadSessions();
            }
        } catch (error) {
            console.error('Failed to create session:', error);
            alert('创建会话失败');
        }
    };

    window.switchSession = async function(sessionId) {
        try {
            currentSessionId = sessionId;

            const response = await fetch(`/ai/sessions/${sessionId}`);
            if (response.ok) {
                const data = await response.json();

                aiChatHistory.innerHTML = '';

                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        if (msg.role === 'user') {
                            addUserMessage(msg.content);
                        } else if (msg.role === 'assistant') {
                            addAIMessage(msg.content);
                        }
                    });
                } else {
                    aiChatHistory.innerHTML = `
                        <div class="ai-message ai">
                            <div class="ai-message-content">开始新的对话吧！</div>
                            <div class="ai-message-time">现在</div>
                        </div>
                    `;
                }

                renderSessionsList();
            }
        } catch (error) {
            console.error('Failed to switch session:', error);
            alert('切换会话失败');
        }
    };

    window.deleteSession = async function(sessionId) {
        if (!confirm('确定要删除这个会话吗？')) return;

        try {
            const response = await fetch(`/ai/sessions/${sessionId}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                if (currentSessionId === sessionId) {
                    currentSessionId = null;
                    aiChatHistory.innerHTML = `
                        <div class="ai-message ai">
                            <div class="ai-message-content">
                                你好！我是你的C++编程助手。我可以帮你：
                                <br><br>
                                • 分析代码中的问题<br>
                                • 提供解题思路和方法<br>
                                • 解释C++知识点<br>
                                • 指导你完成编程练习
                                <br><br>
                                请告诉我你需要什么帮助！
                            </div>
                            <div class="ai-message-time">现在</div>
                        </div>
                    `;
                }

                await loadSessions();
            }
        } catch (error) {
            console.error('Failed to delete session:', error);
            alert('删除会话失败');
        }
    };

    // ===== 收藏功能 =====
    window.toggleFavoritesPanel = function() {
        const panel = document.getElementById('aiFavoritesPanel');
        const isShow = panel.classList.contains('show');

        if (!isShow) {
            loadFavorites();
            panel.classList.add('show');
        } else {
            panel.classList.remove('show');
        }
    };

    async function loadFavorites() {
        const favoritesList = document.getElementById('aiFavoritesList');

        try {
            favoritesList.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">加载中...</div>';

            const response = await fetch('/ai/favorites');

            if (response.ok) {
                const data = await response.json();
                const favorites = data.favorites || [];

                if (favorites.length === 0) {
                    favoritesList.innerHTML = `
                        <div style="padding: 30px; text-align: center; color: #999;">
                            <div style="font-size: 40px; margin-bottom: 10px;">⭐</div>
                            <div>暂无收藏内容</div>
                            <div style="font-size: 11px; margin-top: 6px;">点击消息旁的 ⭐ 按钮即可收藏</div>
                        </div>
                    `;
                    return;
                }

                favoritesList.innerHTML = favorites.map(fav => `
                    <div class="ai-favorite-item"
                         onclick="switchSession(${fav.session_id}); toggleFavoritesPanel();">
                        <div class="ai-favorite-content">${escapeHtml(fav.content)}</div>
                        <div class="ai-favorite-meta">
                            <span>来自：${escapeHtml(fav.session_title)}</span>
                            <span>${new Date(fav.created_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                `).join('');
            }
        } catch (error) {
            console.error('Failed to load favorites:', error);
            favoritesList.innerHTML = '<div style="padding: 20px; text-align: center; color: #dc3545;">加载失败</div>';
        }
    }

    window.toggleFavoriteMessage = async function(content) {
        if (!currentSessionId || !content) {
            alert('无法收藏此消息');
            return;
        }

        try {
            const response = await fetch('/ai/favorites', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: currentSessionId,
                    content: content
                })
            });

            if (response.ok) {
                alert('✅ 已添加到收藏');
            } else {
                const error = await response.json();
                alert('收藏失败：' + (error.error || '未知错误'));
            }
        } catch (error) {
            console.error('Failed to toggle favorite:', error);
            alert('收藏失败');
        }
    };

    window.setAIProblemId = setProblemId;
});
</script>
