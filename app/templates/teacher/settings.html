<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - C++学习平台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="header-left">
            <h1>C++学习平台</h1>
        </div>
        <div class="header-right">
            <div class="greeting">
                <p>上午好，{{ current_user.nickname if current_user.nickname else current_user.username }}</p>
                <p class="sub-greeting">教师后台</p>
            </div>
            <div class="user-icon">
                {% if current_user.avatar %}
                <img src="{{ current_user.avatar }}" alt="用户头像">
                {% else %}
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=user%20profile%20icon%20avatar&image_size=square" alt="用户头像">
                {% endif %}
            </div>
        </div>
    </header>

    <div class="container">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="learning-stats">
                    <p class="days">教师</p>
                    <p class="number">后台</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="/teacher/dashboard">仪表盘</a></li>
                    <li><a href="/teacher/courses/create">创建课程</a></li>
                    <li><a href="/teacher/add-exercise">添加练习</a></li>
                    <li><a href="/community">社区管理</a></li>
                    <li class="active"><a href="/teacher/settings">设置</a></li>
                    <li><a href="/logout">退出登录</a></li>
                </ul>
            </nav>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <div class="section-header">
                <h2>个人设置</h2>
            </div>
            
            <!-- 设置表单 -->
            <div class="settings-form">
                <h3>基本设置</h3>
                <form>
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" class="form-control" value="{{ current_user.username }}">
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" class="form-control" value="{{ current_user.email }}">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" class="form-control" placeholder="输入新密码">
                    </div>
                    <button type="submit" class="btn btn-primary">保存设置</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
