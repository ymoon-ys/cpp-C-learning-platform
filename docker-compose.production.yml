version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: c-learning-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    volumes:
      - uploads_data:/app/uploads
      - static_data:/app/static/dist
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  uploads_data:
    driver: local
  static_data:
    driver: local

networks:
  app-network:
    driver: bridge
